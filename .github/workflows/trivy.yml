name: Trivy Scan

on:
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * * # daily at midnight
  workflow_call:
    inputs:
      image-ref:
        type: string
        description: Docker image ref to be scanned by Trivy
        required: false

env:
  DOCKER_BUILDKIT: "1"
  COSIGN_EXPERIMENTAL: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  trivy-fs:
    name: Scan filesystem
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4 # 升级到稳定版 v4

      - name: Scan repo filesystem
        uses: aquasecurity/trivy-action@18f251a5aa9a6dae48f34428611643994bb3c8d5 # 指向 v0.29.0 的哈希
        continue-on-error: true
        with:
          scan-type: fs
          format: sarif
          output: trivy-results-fs.sarif
          exit-code: "0"

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always() # 确保即使前面有漏洞也尝试上传
        continue-on-error: true # 关键：防止私有仓库权限问题导致 Job 变红
        with:
          sarif_file: trivy-results-fs.sarif

  trivy-image:
    name: Scan image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Normalize image name
        id: normalize
        shell: bash
        env:
          IMAGE_REF: ${{ inputs.image-ref }}
        run: |
          if [ -z "$IMAGE_REF" ]; then
            IMAGE_REF=$(echo "${GITHUB_REPOSITORY/docker-/}" | tr '[:upper:]' '[:lower:]')
            if [[ "$GITHUB_REF_NAME" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              IMAGE_REF="$IMAGE_REF:${GITHUB_REF_NAME/v/}"
            elif [ "$GITHUB_REF_NAME" == "main" ]; then
              IMAGE_REF="$IMAGE_REF:latest"
            else
              BRANCH_NAME=$(echo "${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}" \
                | tr '[:upper:]' '[:lower:]' | sed 's/[^a-zA-Z0-9]/-/g')
              IMAGE_REF="$IMAGE_REF:$BRANCH_NAME"
            fi
          fi
          echo "image-ref=$IMAGE_REF" | tee -a "$GITHUB_OUTPUT"

      - name: Scan image
        uses: aquasecurity/trivy-action@18f251a5aa9a6dae48f34428611643994bb3c8d5 # 同上
        continue-on-error: true
        with:
          image-ref: ${{ steps.normalize.outputs.image-ref }}
          format: sarif
          output: trivy-results-img.sarif
          exit-code: "0"

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true # 关键：如果是私有仓库且没开高级安全功能，此步骤会跳过而不会报错
        with:
          sarif_file: trivy-results-img.sarif
